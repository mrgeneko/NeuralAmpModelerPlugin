<svg xmlns="http://www.w3.org/2000/svg" width="128" height="64" viewBox="0 0 128 64" fill="none">
  <title>Parametric NAM knobs icon</title>
  <desc>Minimal knob-dial icon for NeuralAmpModelerPlugin parametric model indicator.</desc>
  <!-- NAM Azure: rgb(80,133,232) / #5085E8 -->
  <!-- Transparent background -->
  <g shape-rendering="geometricPrecision">
    <!-- Three small knob dials, each with its own pointer, evenly spaced -->
    <circle cx="28" cy="32" r="14" stroke="#5085E8" stroke-width="6" fill="none"/>
    <line x1="28" y1="32" x2="28" y2="20" stroke="#5085E8" stroke-width="6" stroke-linecap="round"/>

    <circle cx="64" cy="32" r="14" stroke="#5085E8" stroke-width="6" fill="none"/>
    <line x1="64" y1="32" x2="73" y2="23" stroke="#5085E8" stroke-width="6" stroke-linecap="round"/>

    <circle cx="100" cy="32" r="14" stroke="#5085E8" stroke-width="6" fill="none"/>
    <line x1="100" y1="32" x2="100" y2="44" stroke="#5085E8" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
