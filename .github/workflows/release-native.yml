name: Release Native

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  PROJECT_NAME: NeuralAmpModeler

# The repository default for GITHUB_TOKEN is read-only, so creating a release
# and uploading its assets both fail with "Resource not accessible by
# integration". Scope the write here rather than loosening the repo-wide
# default, which would also apply to every other workflow.
permissions:
  contents: write

jobs:
  create_release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Creating the release up front (rather than letting the first build job
      # create it) keeps the two build jobs from racing to create the same one.
      - name: Create draft release
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          if gh release view "${{github.ref_name}}" --repo "${{github.repository}}" >/dev/null 2>&1; then
            echo "Release ${{github.ref_name}} already exists, reusing it."
          else
            gh release create "${{github.ref_name}}" \
              --repo "${{github.repository}}" \
              --draft \
              --title "Release ${{github.ref_name}}" \
              --notes-file "${{env.PROJECT_NAME}}/installer/changelog.txt"
          fi
        shell: bash

  build:
    name: Build
    needs: create_release
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            build_dir: build-mac
          - os: windows-latest
            build_dir: build-win

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Get VST3 SDK
      run: |
        cd iPlug2/Dependencies/IPlug
        ./download-iplug-sdks.sh
      shell: bash

    - name: Get Prebuilt Libs
      run: |
        cd iPlug2/Dependencies
        ./download-prebuilt-libs.sh
      shell: bash

    - name: Get Archive Name macOS
      id: mac_archivename_step
      if: matrix.os == 'macOS-latest'
      run: |
        ARCHIVE_NAME=`python3 iPlug2/Scripts/get_archive_name.py ${{env.PROJECT_NAME}} mac full`
        echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
      shell: bash

    - name: Build macOS
      if: matrix.os == 'macOS-latest'
      run: |
        cd ${{env.PROJECT_NAME}}/scripts
        ./makedist-mac.sh full installer
      shell: bash

    # gh upload fails on a missing path, so a build that silently produced no
    # artifact fails the job here rather than finishing green with nothing
    # attached to the release.
    - name: Upload macOS release assets
      if: matrix.os == 'macOS-latest'
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        ARCHIVE_NAME: ${{steps.mac_archivename_step.outputs.archive_name}}
      run: |
        gh release upload "${{github.ref_name}}" \
          "${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${ARCHIVE_NAME}.dmg" \
          "${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${ARCHIVE_NAME}-dSYMs.zip" \
          --repo "${{github.repository}}" \
          --clobber
      shell: bash

    - name: Add msbuild to PATH (Windows)
      if: matrix.os == 'windows-latest'
      uses: microsoft/setup-msbuild@v2

    - name: Setup Python3
      if: matrix.os == 'windows-latest'
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        architecture: 'x64'

    - name: Get Archive Name Windows
      id: win_archivename_step
      if: matrix.os == 'windows-latest'
      run: |
        ARCHIVE_NAME=`python.exe iPlug2/Scripts/get_archive_name.py ${{env.PROJECT_NAME}} win full`
        echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
      shell: bash

    - name: Build Windows
      if: matrix.os == 'windows-latest'
      run: |
        cd ${{env.PROJECT_NAME}}\scripts
        .\makedist-win.bat full installer
      shell: pwsh

    - name: Upload Windows release assets
      if: matrix.os == 'windows-latest'
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        ARCHIVE_NAME: ${{steps.win_archivename_step.outputs.archive_name}}
      run: |
        gh release upload "${{github.ref_name}}" \
          "${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${ARCHIVE_NAME}.zip" \
          "${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${ARCHIVE_NAME}-pdbs.zip" \
          --repo "${{github.repository}}" \
          --clobber
      shell: bash
