name: Release Native

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  PROJECT_NAME: NeuralAmpModeler

# The repository default for GITHUB_TOKEN is read-only, so creating a release
# and uploading its assets both fail with "Resource not accessible by
# integration". Scope the write here rather than loosening the repo-wide
# default, which would also apply to every other workflow.
permissions:
  contents: write

jobs:
  create_release:
    name: Create release
    runs-on: ubuntu-latest
    # Release names come from the ref, so dispatching this against a branch
    # would create a release tagged "main". workflow_dispatch can still target
    # a tag -- pick one in the ref dropdown -- which is the useful case, e.g.
    # re-running a release whose build failed. The build job needs this one, so
    # it skips too.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # release_notes_header.md carries the Downloads / Before-you-install
      # sections (asset names, the signed-and-notarized-on-macOS note) that
      # changelog.txt itself doesn't have -- it's just the changelog, kept
      # as its own file since it's also shown as installer text on Windows/
      # macOS, where the Downloads section wouldn't make sense.
      # __VERSION__ matches github.ref_name's own format (e.g. "v0.8.1"),
      # same as the archive filenames get_archive_name.py produces.
      - name: Build release notes
        run: |
          sed "s/__VERSION__/${{github.ref_name}}/g" \
            "${{env.PROJECT_NAME}}/installer/release_notes_header.md" \
            > /tmp/release_notes.md
          cat "${{env.PROJECT_NAME}}/installer/changelog.txt" >> /tmp/release_notes.md
        shell: bash

      # Creating the release up front (rather than letting the first build job
      # create it) keeps the two build jobs from racing to create the same one.
      - name: Create draft release
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          if gh release view "${{github.ref_name}}" --repo "${{github.repository}}" >/dev/null 2>&1; then
            echo "Release ${{github.ref_name}} already exists; updating its notes."
            gh release edit "${{github.ref_name}}" \
              --repo "${{github.repository}}" \
              --notes-file /tmp/release_notes.md
          else
            gh release create "${{github.ref_name}}" \
              --repo "${{github.repository}}" \
              --draft \
              --title "Release ${{github.ref_name}}" \
              --notes-file /tmp/release_notes.md
          fi
        shell: bash

      # The demo parametric model the fork's settings-page knobs exist to drive.
      # Nothing installs a model, so without this a user has no way to exercise
      # that feature on a fresh install. Uploaded here rather than from the
      # build jobs because it is platform-independent -- doing it in the matrix
      # would have two runners racing to write the same asset name.
      - name: Upload demo parametric model
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        run: |
          gh release upload "${{github.ref_name}}" \
            ParametricModels/muffinator_v4_optimal.param.nam \
            --repo "${{github.repository}}" \
            --clobber
        shell: bash

  build:
    name: Build
    needs: create_release
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            build_dir: build-mac
          - os: windows-latest
            build_dir: build-win

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Get VST3 SDK
      run: |
        cd iPlug2/Dependencies/IPlug
        ./download-iplug-sdks.sh
      shell: bash

    - name: Get Prebuilt Libs
      run: |
        cd iPlug2/Dependencies
        ./download-prebuilt-libs.sh
      shell: bash

    - name: Get Archive Name macOS
      id: mac_archivename_step
      if: matrix.os == 'macOS-latest'
      run: |
        ARCHIVE_NAME=`python3 iPlug2/Scripts/get_archive_name.py ${{env.PROJECT_NAME}} mac full`
        echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
      shell: bash

    # Imports both Developer ID identities (Application -- signs the app/AU/
    # VST3 -- and Installer -- signs the pkg wrapped in the dmg) into a
    # throwaway keychain scoped to this job, and stores the notarization
    # credential profile in that same keychain under the name
    # makedist-mac.sh/notarise-mac.sh already default to
    # (NOTARIZE_KEYCHAIN_PROFILE=AntiStatic-notarize), so neither script
    # needs to know it's running in CI rather than on a maintainer's Mac.
    #
    # Both certificates were issued from the same CSR, so they share one
    # private key -- MACOS_CERTIFICATE_PASSWORD protects both p12s.
    # APPLE_TEAM_ID and APPLE_ID aren't secret (the team ID is already in
    # common-mac.xcconfig, the Apple ID is already in the installer's
    # contact info) so they're plain values here rather than secrets.
    - name: Import signing certificate (macOS)
      if: matrix.os == 'macOS-latest'
      env:
        MACOS_APP_CERTIFICATE_P12: ${{secrets.MACOS_APP_CERTIFICATE_P12}}
        MACOS_INSTALLER_CERTIFICATE_P12: ${{secrets.MACOS_INSTALLER_CERTIFICATE_P12}}
        MACOS_CERTIFICATE_PASSWORD: ${{secrets.MACOS_CERTIFICATE_PASSWORD}}
        APPLE_APP_SPECIFIC_PASSWORD: ${{secrets.APPLE_APP_SPECIFIC_PASSWORD}}
        APPLE_ID: murgencoapps@gmail.com
        APPLE_TEAM_ID: 5N33944Q82
      run: |
        KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
        KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
        echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        APP_P12="$RUNNER_TEMP/app.p12"
        INSTALLER_P12="$RUNNER_TEMP/installer.p12"
        echo "$MACOS_APP_CERTIFICATE_P12" | base64 --decode -o "$APP_P12"
        echo "$MACOS_INSTALLER_CERTIFICATE_P12" | base64 --decode -o "$INSTALLER_P12"

        security import "$APP_P12" -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security
        security import "$INSTALLER_P12" -k "$KEYCHAIN_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security
        rm -f "$APP_P12" "$INSTALLER_P12"

        # Lets codesign/productsign use the imported keys non-interactively --
        # without this, each signing operation would hang on a GUI keychain
        # access prompt that has nowhere to display on a headless runner.
        security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
        security default-keychain -s "$KEYCHAIN_PATH"

        xcrun notarytool store-credentials "AntiStatic-notarize" \
          --apple-id "$APPLE_ID" \
          --team-id "$APPLE_TEAM_ID" \
          --password "$APPLE_APP_SPECIFIC_PASSWORD" \
          --keychain "$KEYCHAIN_PATH"
      shell: bash

    - name: Build macOS
      if: matrix.os == 'macOS-latest'
      env:
        CODESIGN: 1
      run: |
        cd ${{env.PROJECT_NAME}}/scripts
        ./makedist-mac.sh full installer
      shell: bash

    # gh upload fails on a missing path, so a build that silently produced no
    # artifact fails the job here rather than finishing green with nothing
    # attached to the release.
    - name: Upload macOS release assets
      if: matrix.os == 'macOS-latest'
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        ARCHIVE_NAME: ${{steps.mac_archivename_step.outputs.archive_name}}
      run: |
        gh release upload "${{github.ref_name}}" \
          "${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${ARCHIVE_NAME}.dmg" \
          "${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${ARCHIVE_NAME}-dSYMs.zip" \
          --repo "${{github.repository}}" \
          --clobber
      shell: bash

    # Runs even if signing/build/upload failed above, so a failed run doesn't
    # leave key material sitting in $RUNNER_TEMP for the rest of the job.
    - name: Clean up signing keychain (macOS)
      if: always() && matrix.os == 'macOS-latest'
      run: |
        if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
          security delete-keychain "$KEYCHAIN_PATH" || true
        fi
      shell: bash

    - name: Add msbuild to PATH (Windows)
      if: matrix.os == 'windows-latest'
      uses: microsoft/setup-msbuild@v2

    - name: Setup Python3
      if: matrix.os == 'windows-latest'
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        architecture: 'x64'

    - name: Get Archive Name Windows
      id: win_archivename_step
      if: matrix.os == 'windows-latest'
      run: |
        ARCHIVE_NAME=`python.exe iPlug2/Scripts/get_archive_name.py ${{env.PROJECT_NAME}} win full`
        echo "archive_name=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
      shell: bash

    - name: Build Windows
      if: matrix.os == 'windows-latest'
      run: |
        cd ${{env.PROJECT_NAME}}\scripts
        .\makedist-win.bat full installer
      shell: pwsh

    - name: Upload Windows release assets
      if: matrix.os == 'windows-latest'
      env:
        GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
        ARCHIVE_NAME: ${{steps.win_archivename_step.outputs.archive_name}}
      run: |
        gh release upload "${{github.ref_name}}" \
          "${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${ARCHIVE_NAME}.zip" \
          "${{env.PROJECT_NAME}}/${{matrix.build_dir}}/out/${ARCHIVE_NAME}-pdbs.zip" \
          --repo "${{github.repository}}" \
          --clobber
      shell: bash
